<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>컴투스 프로야구 V25 - 랭킹챌린지 기록</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app-wrapper">
    <!-- Header -->
    <header class="app-header">
      <div class="header-content">
        <div class="header-logo">
          <span class="logo-icon">⚾</span>
          <div>
            <h1 class="header-title">컴투스 프로야구 V25</h1>
            <p class="header-sub">랭킹챌린지 기록 관리</p>
          </div>
        </div>
        <div class="header-actions">
          <button class="btn-reset" id="btnReset" title="전체 데이터 초기화">🗑 초기화</button>
          <button class="btn-export" id="btnExport" title="데이터 내보내기">📋 내보내기</button>
        </div>
      </div>
    </header>

    <!-- Day Tabs -->
    <nav class="day-tabs">
      <button class="tab-btn active" data-day="cumulative">📊 누적기록</button>
      <button class="tab-btn" data-day="mon">월</button>
      <button class="tab-btn" data-day="tue">화</button>
      <button class="tab-btn" data-day="wed">수</button>
      <button class="tab-btn" data-day="thu">목</button>
      <button class="tab-btn" data-day="fri">금</button>
      <button class="tab-btn" data-day="sat">토</button>
      <button class="tab-btn" data-day="sun">일</button>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Section Tabs -->
      <div class="section-tabs">
        <button class="section-btn active" data-section="batter">🏏 타자 기록</button>
        <button class="section-btn" data-section="pitcher">⚾ 투수 기록</button>
      </div>

      <!-- Current Day Label -->
      <div class="current-label" id="currentLabel">📊 누적기록</div>

      <!-- OCR Upload Bar (only shown on weekday tabs) -->
      <div class="ocr-bar" id="ocrBar" style="display:none;">
        <span class="ocr-bar-label">📸 스크린샷 자동 입력</span>
        <label class="btn-ocr" id="btnOcrBatter">
          🏏 타자 스크린샷
          <input type="file" id="ocrFileBatter" accept="image/*" style="display:none;" />
        </label>
        <label class="btn-ocr" id="btnOcrPitcher">
          ⚾ 투수 스크린샷
          <input type="file" id="ocrFilePitcher" accept="image/*" style="display:none;" />
        </label>
        <!-- Progress -->
        <div id="ocrProgressWrap" style="display:none; flex:1; min-width:120px;">
          <div class="ocr-progress-track">
            <div class="ocr-progress-bar" id="ocrProgressBar" style="width:0%"></div>
          </div>
          <div class="ocr-status-text" id="ocrStatusText">인식 중...</div>
        </div>
      </div>

      <!-- Batter Section -->
      <section id="batterSection" class="record-section">
        <div class="table-container">
          <table class="record-table" id="batterTable">
            <thead>
              <tr>
                <th class="col-name">선수명</th>
                <th class="col-stat derived">OPS</th>
                <th class="col-stat derived">출루율</th>
                <th class="col-stat derived">장타율</th>
                <th class="col-stat derived">타율</th>
                <th class="col-stat derived">득점권타율</th>
                <th class="col-stat">경기</th>
                <th class="col-stat">타수</th>
                <th class="col-stat">안타</th>
                <th class="col-stat">2루타</th>
                <th class="col-stat">3루타</th>
                <th class="col-stat">홈런</th>
                <th class="col-stat">볼넷</th>
                <th class="col-stat">사구</th>
                <th class="col-stat">희생플라이</th>
                <th class="col-stat">득점권타수</th>
                <th class="col-stat">득점권안타</th>
              </tr>
            </thead>
            <tbody id="batterBody"></tbody>
          </table>
        </div>
      </section>

      <!-- Pitcher Section -->
      <section id="pitcherSection" class="record-section hidden">
        <div class="table-container">
          <table class="record-table" id="pitcherTable">
            <thead>
              <tr>
                <th class="col-name">선수명</th>
                <th class="col-stat derived">ERA</th>
                <th class="col-stat">경기</th>
                <th class="col-stat">승</th>
                <th class="col-stat">패</th>
                <th class="col-stat">이닝</th>
                <th class="col-stat">자책점</th>
              </tr>
            </thead>
            <tbody id="pitcherBody"></tbody>
          </table>
        </div>
      </section>

      <!-- Save Button -->
      <div class="save-bar" id="saveBar" style="display:none;">
        <button class="btn-save" id="btnSave">💾 저장하기</button>
        <span class="save-hint">변경사항이 있습니다</span>
      </div>
    </main>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <!-- Reset Confirm Modal -->
  <div class="modal-overlay" id="resetModal">
    <div class="modal">
      <h3>⚠️ 데이터 초기화</h3>
      <p>모든 기록이 삭제됩니다. 계속하시겠습니까?</p>
      <div class="modal-actions">
        <button class="btn-cancel" id="btnCancelReset">취소</button>
        <button class="btn-confirm" id="btnConfirmReset">초기화</button>
      </div>
    </div>
  </div>

  <!-- OCR Confirm Modal -->
  <div class="modal-overlay ocr-modal-overlay" id="ocrConfirmModal">
    <div class="modal ocr-modal">
      <h3 id="ocrConfirmTitle">📸 인식 결과</h3>
      <p class="ocr-modal-hint" id="ocrModalHint">인식된 값을 확인·수정 후 적용하세요. 비어있는 칸은 덮어쓰지 않습니다.</p>
      <div class="ocr-table-wrap">
        <table class="ocr-confirm-table">
          <thead id="ocrConfirmHead"></thead>
          <tbody id="ocrConfirmBody"></tbody>
        </table>
      </div>
      <details class="ocr-raw-details">
        <summary>📄 OCR 원문 보기</summary>
        <pre id="ocrRawText" class="ocr-raw-text"></pre>
      </details>
      <div class="modal-actions">
        <button class="btn-cancel" id="ocrCancelBtn">취소</button>
        <button class="btn-confirm" id="ocrApplyBtn">✅ 적용하기</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="ocr.js"></script>
</body>

</html>
